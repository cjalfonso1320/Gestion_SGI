{% extends 'home.html' %}
{% block title %}Crear Curso{% endblock %}
{% block content %}
<!-- Vinculamos el CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/reg_aula.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/form_indicadores.css') }}">

<div class="welcome-section">
    <!-- Botón Volver estilizado -->
    <button class="btn-volver" onclick="location.href='{{ url_for('aula.gestionar_cursos') }}'">
        <i class="fa-solid fa-arrow-left"></i> Volver a Gestionar Cursos
    </button>

    <div class="form-container">
        <form action="{{ url_for('aula.crear_curso') }}" method="post" enctype="multipart/form-data">
            <h2>Crear Nuevo Curso</h2>

            <div class="form-grid-container">
                <div class="form-field full-width">
                    <label class="form-label" for="nombre">Nombre del Curso:</label>
                    <input class="form-control" type="text" id="nombre" name="nombre"
                        placeholder="Ej: Inducción de Seguridad" required>
                </div>

                <div class="form-field full-width">
                    <label class="form-label" for="descripcion">Descripción:</label>
                    <textarea class="form-control" id="descripcion" name="descripcion"
                        placeholder="Breve descripción del contenido..." required></textarea>
                </div>

                <div class="form-field">
                    <label class="form-label">Archivo de Estudio (PDF)</label>
                    <input class="form-control" type="file" id="documento" name="documento" required>
                </div>
                <div class="form-field">
                    <label class="form-label">Enlace de Video</label>
                    <input class="form-control" type="text" id="enlace_video" name="enlace_video" required>
                </div>

                <div class="form-field">
                    <label class="form-label">Fecha Límite</label>
                    <input class="form-control" type="date" id="duracion" name="duracion" required>
                </div>
            </div>

            <div class="evaluacion-header">
                <h3><i class="fa-solid fa-graduation-cap"></i> Configuración de la Evaluación</h3>
            </div>

            <div id="cantidadPreguntasdiv" class="analysis-container">
                <label class="form-label">¿Cuántas preguntas tendrá el examen?</label>
                <div style="display: flex; gap: 15px;">
                    <input class="form-control" id="cantidadPreguntas" type="number" min="1"
                        style="width: 100px; margin-bottom: 0;">
                    <button type="button" class="btn-continuar" onclick="crearPreguntas()">Configurar Preguntas</button>
                </div>
            </div>

            <div id="preguntasContainer"></div>

            <button type="submit" class="btn-guardar" style="display: none;" id="btnGuardarCurso">Guardar y Publicar
                Curso</button>
        </form>
    </div>
</div>
<script>
    function crearPreguntas() {
        const cantidad = parseInt(document.getElementById('cantidadPreguntas').value);
        const container = document.getElementById('preguntasContainer');

        if (!cantidad || cantidad < 1) {
            alert('Por favor, ingresa una cantidad válida de preguntas.');
            return;
        }

        document.getElementById('cantidadPreguntasdiv').style.display = 'none';
        document.getElementById('btnGuardarCurso').style.display = 'block';
        container.innerHTML = '';

        for (let i = 1; i <= cantidad; i++) {
            container.innerHTML += `
                <div class="pregunta">
                    <h4>Pregunta ${i}</h4>
                    <label class="form-label">Tipo de Respuesta:</label>
                    <select class="form-control" name="tipo_pregunta_${i}" onchange="cambiarTipo(this, ${i})" required>
                        <option value="" selected disabled>Seleccione tipo</option>
                        <option value="opcion_multiple">Opción Múltiple</option>
                        <option value="vf">Verdadero/Falso</option>
                        <option value="texto">Respuesta Abierta</option>
                    </select>
                    <div id="tipo_${i}"></div>
                </div>`;
        }
    }
    function cambiarTipo(select, i) {
        const div = document.getElementById(`tipo_${i}`);
        const tipo = select.value;
        div.innerHTML = '';

        if (tipo === 'opcion_multiple') {
            div.innerHTML = `
                <label class="form-label">Pregunta:</label>
                <input class="form-control" type="text" name="preguntas[${i}][pregunta]" required>

                <label class="form-label">Opciones:</label>
                <div class="opcion">
                    <input type="radio" name="preguntas[${i}][correcta]" value="A" required>
                    <input class="form-control"
                        name="preguntas[${i}][opciones][]" placeholder="Opción A" required>
                </div>

                <div class="opcion">
                    <input type="radio" name="preguntas[${i}][correcta]" value="B">
                    <input class="form-control"
                        name="preguntas[${i}][opciones][]" placeholder="Opción B" required>
                </div>

                <div class="opcion">
                    <input type="radio" name="preguntas[${i}][correcta]" value="C">
                    <input class="form-control"
                        name="preguntas[${i}][opciones][]" placeholder="Opción C">
                </div>

                <div class="opcion">
                    <input type="radio" name="preguntas[${i}][correcta]" value="D">
                    <input class="form-control"
                        name="preguntas[${i}][opciones][]" placeholder="Opción D">
                </div>
                `;
        }
        if (tipo === 'vf') {
           div.innerHTML = `
        <label class="form-label">Pregunta</label>
        <input class="form-control" name="preguntas[${i}][pregunta]" required>

        <label class="form-label">Respuesta Correcta</label>
        <!-- AGREGADA LA CLASE form-control AQUÍ -->
        <select class="form-control" name="preguntas[${i}][respuesta]" required>
            <option value="V">Verdadero</option>
            <option value="F">Falso</option>
        </select>
    `;
        }
        if (tipo === 'texto') {
            div.innerHTML = `
            <label>Pregunta</label>
            <input class="form-control" name="preguntas[${i}][pregunta]" required>

            <label>Respuesta correcta</label>
            <textarea class="form-control" name="preguntas[${i}][respuesta]" required></textarea>
        `;
        }
    }
</script>
{% endblock %}
